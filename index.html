<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>National Forest Explorer</title>
    <script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/pmtiles@3.0.6/dist/pmtiles.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; min-height: 100vh; align-items: center; font-family: sans-serif; background: #f4f4f4; }
        #header { padding: 20px; text-align: center; }
        #main-container { display: flex; width: 90%; max-width: 1200px; gap: 20px; margin-bottom: 20px; }
        #sidebar { width: 300px; padding: 20px; background: #fff; border: 1px solid #ccc; }
        #map-wrapper { flex-grow: 1; position: relative; }
        #map { width: 100%; height: 600px; border: 1px solid #999; }
        select, button { width: 100%; padding: 10px; margin-top: 10px; cursor: pointer; }
        .maplibregl-ctrl-group button { display: flex !important; align-items: center !important; justify-content: center !important; width: 30px !important; height: 30px !important; }
        .route-warning { font-size: 10px; color: #d32f2f; margin-top: 10px; line-height: 1.2; }
        #route-info { margin-top: 10px; font-weight: bold; color: #1976d2; }
        
        /* New Styles for Directions List */
        .directions-list { margin-top: 10px; font-size: 12px; max-height: 200px; overflow-y: auto; border-top: 1px solid #ccc; padding-top: 5px; }
        .dir-item { margin-bottom: 5px; border-bottom: 1px dotted #ccc; padding-bottom: 3px; cursor: pointer; }
        .dir-item:hover { background: #e3f2fd; }
    </style>
</head>
<body>

<div id="header"><h1>National Forest Explorer</h1></div>

<div id="main-container">
    <div id="sidebar">
        <select id="forest-select"><option value="" disabled selected>-- Select a Forest --</option></select>
        <select id="base-selector">
            <option value="streets-v2" selected>Standard (Streets)</option>
            <option value="outdoor-v2">Outdoor</option>
            <option value="019e74c9-570e-7893-90e7-a01ec7d07286">Satellite Hybrid</option>
        </select>
        <button id="toggle-roads">Toggle MVUM Roads</button>
    </div>
    <div id="map-wrapper"><div id="map"></div></div>
</div>

<script>
    let mapTilerKey = null;
    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol("pmtiles", protocol.tile);

    let roadsVisible = false;
    let currentFile = null;
    let fullRouteGeometry = null;
    let popup = new maplibregl.Popup({ closeButton: false, closeOnClick: true });
    let map;

    // --- LOGIC: DATA PROCESSING ---
    function processDirections(steps) {
        if (!steps || !Array.isArray(steps)) return [];
        return steps.map((step) => {
            const isNameValid = step.name && step.name !== "-" && step.name.toLowerCase() !== "the road";
            let displayLabel = step.instruction;
            if (isNameValid && !step.instruction.includes(step.name)) {
                displayLabel = `${step.instruction} (${step.name})`;
            }
            return { ...step, displayLabel, miles: (step.distance / 1609.34).toFixed(1), wayPoints: step.way_points };
        });
    }

    async function initApp() {
        const config = await fetch('/api/get-config').then(r => r.json());
        mapTilerKey = config.mapTilerKey;

        map = new maplibregl.Map({
            container: 'map',
            style: `https://api.maptiler.com/maps/streets-v2/style.json?key=${mapTilerKey}`,
            center: [-98.6, 39.8], zoom: 3
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');
        map.addControl(new maplibregl.FullscreenControl(), 'top-right');

        document.getElementById('base-selector').addEventListener('change', updateStyle);
        document.getElementById('forest-select').addEventListener('change', handleForestSelect);
        document.getElementById('toggle-roads').addEventListener('click', toggleRoads);
        
        map.on('click', 'road-core', handleRoadClick);
        map.on('mouseenter', 'road-core', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'road-core', () => map.getCanvas().style.cursor = '');
        map.on('idle', () => { if (roadsVisible && currentFile && !map.getSource('roads')) syncRoads(); });
    }

    function syncRoads() {
        if (map.getLayer('road-casing')) map.removeLayer('road-casing');
        if (map.getLayer('road-core')) map.removeLayer('road-core');
        if (map.getSource('roads')) map.removeSource('roads');
        if (roadsVisible && currentFile && map.isStyleLoaded()) {
            map.addSource('roads', { type: 'vector', url: `pmtiles://tiles/${currentFile}` });
            map.addLayer({ "id": "road-casing", "type": "line", "source": "roads", "source-layer": "mvum_roads", "paint": { "line-color": "#ffffff", "line-width": 6 } });
            map.addLayer({ "id": "road-core", "type": "line", "source": "roads", "source-layer": "mvum_roads", "paint": { "line-color": "#e65100", "line-width": 3 } });
            // Ensure route stays on top
            if (map.getLayer('route-line')) { map.moveLayer('route-line'); map.moveLayer('route-arrows'); }
        }
    }

    async function handleRoadClick(e) {
        const props = e.features[0].properties;
        const coords = e.lngLat;
        popup.setLngLat(coords).setHTML(`
            <strong>Name:</strong> ${props.NAME || 'N/A'}<br>
            <input type="text" id="from-location" placeholder="Start address" style="width:100%; margin:10px 0;">
            <button id="btn-get-route">Get Directions</button>
            <div id="route-info"></div>
            <p class="route-warning"><strong>⚠️ Warning:</strong> Verify closures with USFS MVUM.</p>
        `).addTo(map);

        document.getElementById('btn-get-route').onclick = async () => {
            const fromText = document.getElementById('from-location').value;
            if (!fromText) return alert("Enter a starting location");
            try {
                const geo = await fetch(`/api/geocode?q=${encodeURIComponent(fromText)}`).then(r => r.json());
                const fromCoords = geo.features[0].center; 
                const routeRes = await fetch('/api/route', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ start: fromCoords, end: [coords.lng, coords.lat] })
                });
                const data = await routeRes.json();

                fullRouteGeometry = data.features[0].geometry;
                const cleaned = processDirections(data.features[0].properties.segments[0].steps);

                document.getElementById('route-info').innerHTML = `
                    ${Math.round(data.features[0].properties.summary.duration / 60)} min | ${(data.features[0].properties.summary.distance / 1609.34).toFixed(1)} miles
                    <div class="directions-list">
                        ${cleaned.map((s, idx) => `<div class="dir-item" data-index="${idx}"><strong>${s.displayLabel}</strong> (${s.miles} mi)</div>`).join('')}
                    </div>
                `;
                
                document.querySelectorAll('.dir-item').forEach(item => {
                    item.onclick = (e) => {
                        e.stopPropagation(); // Keep popup open
                        const step = cleaned[item.dataset.index];
                        const segmentCoords = fullRouteGeometry.coordinates.slice(step.wayPoints[0], step.wayPoints[1] + 1);
                        
                        // Update Highlight
                        map.getSource('highlight-route').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: segmentCoords } });
                        
                        // Zoom
                        const bbox = turf.bbox({type: 'LineString', coordinates: segmentCoords});
                        map.fitBounds([[bbox[0], bbox[1]], [bbox[2], bbox[3]]], { padding: 50 });
                    };
                });
                renderRoute(fullRouteGeometry);
            } catch (e) { alert("Could not calculate route"); }
        };
    }

    function renderRoute(geometry) {
        // Handle Base Route
        if (map.getSource('route')) {
            map.getSource('route').setData(geometry);
        } else {
            map.addSource('route', { type: 'geojson', data: geometry });
            map.addLayer({ id: 'route-line', type: 'line', source: 'route', paint: { 'line-color': '#1976d2', 'line-width': 6, 'line-opacity': 0.8 } });
        }

        // Handle Highlight Layer (Always ensure it exists and is on top)
        if (!map.getSource('highlight-route')) {
            map.addSource('highlight-route', { type: 'geojson', data: { type: 'LineString', coordinates: [] } });
            map.addLayer({
                id: 'highlight-route', type: 'line', source: 'highlight-route',
                paint: { 'line-color': '#ffffff', 'line-width': 10, 'line-opacity': 1.0 }
            });
        }
    }

    function updateStyle(e) {
        popup.remove();
        map.setStyle(`https://api.maptiler.com/maps/${e.target.value}/style.json?key=${mapTilerKey}`);
        map.once('idle', () => { 
            if (fullRouteGeometry) renderRoute(fullRouteGeometry); 
            if (roadsVisible) syncRoads();
        });
    }

    function handleForestSelect(e) {
        const data = JSON.parse(e.target.value);
        currentFile = e.target.selectedOptions[0].dataset.file;
        map.fitBounds([[data[0], data[1]], [data[2], data[3]]], { padding: 50 });
        popup.remove();
        syncRoads();
    }

    function toggleRoads() {
        if (!currentFile) return alert("Select a forest first");
        roadsVisible = !roadsVisible;
        if (!roadsVisible) popup.remove();
        syncRoads();
    }

    fetch('forests.json').then(r => r.json()).then(data => {
        const select = document.getElementById('forest-select');
        data.forEach(f => {
            const opt = document.createElement('option');
            opt.value = JSON.stringify(f.bounds); opt.dataset.file = f.file; opt.text = f.name;
            select.appendChild(opt);
        });
    });

    initApp();
</script>
</body>
</html>
