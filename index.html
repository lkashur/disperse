<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>National Forest Explorer</title>
    <script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/pmtiles@3.0.6/dist/pmtiles.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        
        body { margin: 0; display: flex; flex-direction: column; min-height: 100vh; align-items: center; font-family: sans-serif; background: #f4f4f4; }
        #header { padding: 20px; text-align: center; }
        #main-container { display: flex; width: 90%; max-width: 1200px; gap: 20px; margin-bottom: 20px; }
        
        #sidebar { width: 300px; padding: 20px; background: #fff; border: 1px solid #ccc; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
        
        #map-wrapper { flex-grow: 1; display: flex; height: 600px; border: 1px solid #999; overflow: hidden; background: #fff; position: relative; }
        #nav-panel { width: 300px; height: 100%; background: rgba(230, 230, 230, 0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-right: 1px solid rgba(200, 200, 200, 0.5); padding: 15px; display: none; overflow-y: auto; z-index: 2; position: absolute; top: 0; left: 0; pointer-events: auto; }
        #close-btn { position: absolute; top: 5px; right: 10px; cursor: pointer; font-size: 20px; font-weight: bold; color: #333; }
        #close-btn:hover { color: #000; }
        #map { flex-grow: 1; height: 100%; }
        
        #snapshot-container { margin-top: 15px; padding-top: 15px; border-top: 2px solid #ddd; width: 100%; }
        #snapshot-map { display: none; width: 100%; height: 250px; object-fit: cover; margin-top: 10px; border: 1px solid #ccc; }
        #snapshot-date { font-size: 11px; color: #666; font-style: italic; margin-top: 5px; text-align: center; }

        select, button { padding: 10px; cursor: pointer; width: 100%; margin-bottom: 5px; display: block; box-sizing: border-box; }
        #date-select { display: none; margin-bottom: 10px; background: #fff; border: 1px solid #ccc; }

        .instructions { font-size: 13px; color: #555; margin-bottom: 5px; line-height: 1.4; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .route-warning { font-size: 10px; color: #b71c1c; margin-top: 10px; line-height: 1.2; background: rgba(255,255,255,0.4); padding: 5px; border-radius: 4px; }
        #route-info { margin-top: 10px; font-weight: bold; color: #0d47a1; }
        .directions-list { margin-top: 10px; font-size: 12px; max-height: 300px; overflow-y: auto; border-top: 1px solid #999; padding-top: 5px; }
        .dir-item { margin-bottom: 5px; border-bottom: 1px dotted #999; padding-bottom: 3px; cursor: pointer; }
        .dir-item:hover { background: rgba(255, 255, 255, 0.7); }
    </style>
</head>
<body>

<div id="header"><h1>National Forest Explorer</h1></div>

<div id="main-container">
    <div id="sidebar">
        <div class="instructions">
            <strong>How to use:</strong><br>
            1. Select a forest to view map.<br>
            2. Choose a display style.<br>
            3. Toggle MVUM roads or boundary shade.
        </div>
        
        <select id="forest-select"><option value="" disabled selected>-- Select a Forest --</option></select>
        <select id="base-selector">
            <option value="streets-v2" selected>Standard (Streets)</option>
            <option value="outdoor-v2">Outdoor</option>
            <option value="019e74c9-570e-7893-90e7-a01ec7d07286">Satellite Hybrid</option>
        </select>
        
        <button id="toggle-roads">Toggle MVUM Roads</button>
        <button id="toggle-boundary">Toggle Forest Boundary</button>
        <button id="btn-screenshot" style="background: #2e7d32; color: white; border: none; margin-top: 10px;">Save Screenshot & Metadata</button>
        
        <div id="snapshot-container">
            <button id="btn-fetch-dates" style="background: #0d47a1; color: white; border: none;">Load Available Dates</button>
            <select id="date-select"></select>
            <button id="btn-view-snapshot" style="background: #2e7d32; color: white; border: none; display: none;">View Selected Date</button>
            <img id="snapshot-map" src="" alt="Satellite Snapshot">
            <div id="snapshot-date"></div>
            <div style="font-size: 9px; color: #888; text-align: center; margin-top: 5px;">Contains modified Copernicus Sentinel data</div>
        </div>
    </div>
    
    <div id="map-wrapper">
        <div id="nav-panel">
            <div id="close-btn">&times;</div>
            <div id="nav-content"></div>
        </div>
        <div id="map"></div>
    </div>
</div>

<script>
    let mapTilerKey = null;
    let sentinelInstanceId = null;
    let sentinelLayerId = null;
    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol("pmtiles", protocol.tile);

    let roadsVisible = false;
    let boundaryVisible = false; 
    let currentRoadFile = null;
    let currentBoundaryFile = null;
    let currentBounds = null;
    let currentForestName = "";
    let fullRouteGeometry = null;
    let map;

    let activeRoadCoords = null;
    let activeRoadName = "";
    let lastRouteSteps = null; 
    let activeHighlightIndex = null;

    async function getAccessToken() {
        try {
            const response = await fetch('/api/get-token');
            if (!response.ok) throw new Error('Auth failed');
            const data = await response.json();
            return data.access_token;
        } catch (e) { return null; }
    }

    async function fetchAvailableDates() {
        const dateSelect = document.getElementById('date-select');
        const viewBtn = document.getElementById('btn-view-snapshot');
        dateSelect.innerHTML = '<option>Searching...</option>';
        dateSelect.style.display = 'block';

        const token = await getAccessToken();
        const squareBounds = getSquareBounds(map);
        
        try {
            const response = await fetch('https://sh.dataspace.copernicus.eu/api/v1/catalog/1.0.0/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                    bbox: [squareBounds.getWest(), squareBounds.getSouth(), squareBounds.getEast(), squareBounds.getNorth()],
                    datetime: '2026-01-01T00:00:00Z/..',
                    collections: ['sentinel-2-l2a'],
                    limit: 20
                })
            });
            const data = await response.json();
            
            if (!data.features || data.features.length === 0) {
                dateSelect.innerHTML = '<option>No imagery found</option>';
                return;
            }

            // Manually sort features by date descending
            const sortedFeatures = data.features.sort((a, b) => new Date(b.properties.datetime) - new Date(a.properties.datetime));

            dateSelect.innerHTML = '';
            const dates = [...new Set(sortedFeatures.map(f => f.properties.datetime.split('T')[0]))];
            
            dates.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d; opt.innerText = d;
                dateSelect.appendChild(opt);
            });
            viewBtn.style.display = 'block';
        } catch (e) { dateSelect.innerHTML = '<option>Error loading dates</option>'; }
    }

    function getSquareBounds(map) {
        const center = map.getCenter();
        const bounds = map.getBounds();
        const latDiff = Math.abs(bounds.getNorth() - bounds.getSouth());
        const lngDiff = Math.abs(bounds.getEast() - bounds.getWest());
        const size = Math.max(latDiff, lngDiff); 
        
        return new maplibregl.LngLatBounds(
            [center.lng - size / 2, center.lat - size / 2],
            [center.lng + size / 2, center.lat + size / 2]
        );
    }

    async function updateSnapshot() {
        const dateEl = document.getElementById('snapshot-date');
        const imgEl = document.getElementById('snapshot-map');
        const selectedDate = document.getElementById('date-select').value;
        
        dateEl.innerText = "Loading image...";
        
        const squareBounds = getSquareBounds(map);
        const token = await getAccessToken();

        const wmsUrl = `https://sh.dataspace.copernicus.eu/ogc/wms/${sentinelInstanceId}?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&LAYERS=${sentinelLayerId}&STYLES=&WIDTH=512&HEIGHT=512&FORMAT=image/png&TRANSPARENT=true&BBOX=${squareBounds.getWest()},${squareBounds.getSouth()},${squareBounds.getEast()},${squareBounds.getNorth()}&CRS=EPSG:4326&TIME=${selectedDate}/${selectedDate}&access_token=${token}`;

        imgEl.src = wmsUrl;
        imgEl.style.display = 'block';
        dateEl.innerText = `Imagery from: ${selectedDate}`;

        let dlBtn = document.getElementById('high-res-dl');
        if (!dlBtn) {
            dlBtn = document.createElement('a');
            dlBtn.id = 'high-res-dl';
            dlBtn.innerText = "Download Image";
            dlBtn.style.display = "block";
            dlBtn.style.fontSize = "10px";
            dlBtn.style.marginTop = "5px";
            dlBtn.style.textAlign = "center";
            document.getElementById('snapshot-container').appendChild(dlBtn);
        }
        dlBtn.href = wmsUrl;
        dlBtn.download = `sentinel-${selectedDate}.png`;
    }

    function updateMapInteractions() {
        const base = document.getElementById('base-selector').value;
        const is3D = (base === '019e74c9-570e-7893-90e7-a01ec7d07286');
        if (is3D) { map.dragRotate.enable(); map.touchZoomRotate.enableRotation(); } 
        else { map.dragRotate.disable(); map.touchZoomRotate.disableRotation(); map.setPitch(0); map.setBearing(0); }
    }

    function updateTerrain() {
        const base = document.getElementById('base-selector').value;
        const isSatellite = (base === '019e74c9-570e-7893-90e7-a01ec7d07286');
        if (isSatellite) {
            if (!map.getSource('terrain')) map.addSource('terrain', { type: 'raster-dem', url: `https://api.maptiler.com/tiles/terrain-rgb/tiles.json?key=${mapTilerKey}` });
            map.setTerrain({ source: 'terrain', exaggeration: 1.5 });
        } else { map.setTerrain(null); }
    }

    async function initApp() {
        const config = await fetch('/api/get-config').then(r => r.json());
        mapTilerKey = config.mapTilerKey;
        sentinelInstanceId = config.sentinelInstanceId;
        sentinelLayerId = config.sentinelLayerId;

        map = new maplibregl.Map({ container: 'map', style: `https://api.maptiler.com/maps/streets-v2/style.json?key=${mapTilerKey}`, center: [-98.6, 39.8], zoom: 3 });
        
        map.addControl(new maplibregl.FullscreenControl({ container: document.querySelector('#map-wrapper') }), 'top-right');
        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        document.getElementById('btn-fetch-dates').addEventListener('click', fetchAvailableDates);
        document.getElementById('btn-view-snapshot').addEventListener('click', updateSnapshot);
        
        document.getElementById('btn-screenshot').addEventListener('click', captureView);
        document.getElementById('close-btn').addEventListener('click', closeNav);
        document.getElementById('base-selector').addEventListener('change', updateStyle);
        document.getElementById('forest-select').addEventListener('change', handleForestSelect);
        document.getElementById('toggle-roads').addEventListener('click', toggleRoads);
        document.getElementById('toggle-boundary').addEventListener('click', toggleBoundary);
        
        map.on('click', 'road-core', handleRoadClick);
        map.on('mouseenter', 'road-core', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'road-core', () => map.getCanvas().style.cursor = '');
        map.on('idle', () => { if (roadsVisible && currentRoadFile && !map.getSource('roads')) syncRoads(); if (currentBoundaryFile && !map.getSource('boundary-source')) syncBoundary(); });
        
        map.on('load', () => { ensureHighlightLayer(); updateTerrain(); updateMapInteractions(); });
    }

    async function captureView() {
        const mapWrapper = document.getElementById('map-wrapper');
        const originalWidth = mapWrapper.style.width; const originalHeight = mapWrapper.style.height;
        const originalStyle = map.getStyle(); 
        mapWrapper.style.width = '512px'; mapWrapper.style.height = '512px'; map.resize();

        map.setStyle(`https://api.maptiler.com/maps/019e74c9-570e-7893-90e7-a01ec7d07286/style.json?key=${mapTilerKey}`);
        await new Promise(resolve => map.once('idle', resolve));
        const imgData = map.getCanvas().toDataURL('image/png');
        const link = document.createElement('a'); link.href = imgData; link.download = `forest-sat-${Date.now()}.png`; link.click();

        const metadata = { forest: currentForestName, bounds: map.getBounds().toArray(), center: map.getCenter(), zoom: map.getZoom(), timestamp: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(metadata, null, 2)], {type: 'application/json'});
        const metaLink = document.createElement('a'); metaLink.href = URL.createObjectURL(blob); metaLink.download = `forest-meta-${Date.now()}.json`; metaLink.click();

        map.setStyle(originalStyle);
        await new Promise(resolve => map.once('idle', resolve));
        if (roadsVisible) syncRoads(); syncBoundary();
        mapWrapper.style.width = originalWidth; mapWrapper.style.height = originalHeight; map.resize();
    }

    function closeNav() {
        document.getElementById('nav-panel').style.display = 'none';
        activeRoadCoords = null; activeRoadName = ""; lastRouteSteps = null; activeHighlightIndex = null;
        if (map.getSource('route')) map.getSource('route').setData({type: 'FeatureCollection', features: []});
        if (map.getSource('highlight-route')) map.getSource('highlight-route').setData({type: 'Feature', geometry: {type: 'LineString', coordinates: []}});
    }

    function ensureHighlightLayer() {
        if (!map.getSource('highlight-route')) {
            map.addSource('highlight-route', { type: 'geojson', data: { type: 'LineString', coordinates: [] } });
            map.addLayer({ id: 'highlight-route', type: 'line', source: 'highlight-route', paint: { 'line-color': '#ff00ff', 'line-width': 10, 'line-opacity': 0.9 } });
        }
    }

    function syncRoads() {
        if (map.getLayer('road-casing')) map.removeLayer('road-casing');
        if (map.getLayer('road-core')) map.removeLayer('road-core');
        if (map.getSource('roads')) map.removeSource('roads');
        if (roadsVisible && currentRoadFile) {
            map.addSource('roads', { type: 'vector', url: `pmtiles://tiles/${currentRoadFile}` });
            map.addLayer({ "id": "road-casing", "type": "line", "source": "roads", "source-layer": "mvum_roads", "paint": { "line-color": "#ffffff", "line-width": 6 } });
            map.addLayer({ "id": "road-core", "type": "line", "source": "roads", "source-layer": "mvum_roads", "paint": { "line-color": "#e65100", "line-width": 3 } });
            if (map.getLayer('route-line')) { map.moveLayer('route-line'); map.moveLayer('route-arrows'); }
        }
    }

    function syncBoundary() {
        if (map.getLayer('boundary-fill')) map.removeLayer('boundary-fill');
        if (map.getLayer('boundary-label')) map.removeLayer('boundary-label');
        if (map.getSource('label-source')) map.removeSource('label-source');
        if (map.getSource('boundary-source')) map.removeSource('boundary-source');
        if (currentBoundaryFile && currentBoundaryFile !== "undefined") {
            map.addSource('boundary-source', { type: 'vector', url: `pmtiles://tiles/${currentBoundaryFile}` });
            if (boundaryVisible) map.addLayer({ "id": "boundary-fill", "type": "fill", "source": "boundary-source", "source-layer": "forest_boundary", "paint": { "fill-color": "#2e7d32", "fill-opacity": 0.3 } });
        }
        syncLabel();
    }

    function syncLabel() {
        if (map.getLayer('boundary-label')) map.removeLayer('boundary-label');
        if (map.getSource('label-source')) map.removeSource('label-source');
        if (currentBounds && currentForestName) {
            const center = [(currentBounds[0] + currentBounds[2]) / 2, (currentBounds[1] + currentBounds[3]) / 2];
            map.addSource('label-source', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'Point', coordinates: center }, properties: { name: currentForestName } } });
            map.addLayer({ "id": "boundary-label", "type": "symbol", "source": "label-source", "layout": { "text-field": ["get", "name"], "text-size": ["interpolate", ["linear"], ["zoom"], 3, 10, 10, 24], "text-font": ["Open Sans Bold"], "text-anchor": "center", "text-allow-overlap": true }, "paint": { "text-color": "#000", "text-halo-color": "#ffffff", "text-halo-width": 2 } });
        }
    }

    function highlightSegment(index) {
        if (!lastRouteSteps) return;
        activeHighlightIndex = index;
        const step = lastRouteSteps[index];
        const segmentCoords = fullRouteGeometry.coordinates.slice(step.wayPoints[0], step.wayPoints[1] + 1);
        map.getSource('highlight-route').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: segmentCoords } });
        const bbox = turf.bbox({type: 'LineString', coordinates: segmentCoords});
        map.fitBounds([[bbox[0], bbox[1]], [bbox[2], bbox[3]]], { padding: 50 });
    }

    function bindDirectionsClicks(steps) {
        document.querySelectorAll('.dir-item').forEach(item => {
            item.onclick = (e) => { e.stopPropagation(); highlightSegment(parseInt(item.dataset.index)); };
        });
    }

    function updateNavPanel(coords, name, steps = null) {
        activeRoadCoords = coords; activeRoadName = name;
        const panel = document.getElementById('nav-panel');
        panel.style.display = 'block';
        document.getElementById('nav-content').innerHTML = `
            <strong>Road:</strong> ${name}<br>
            <input type="text" id="from-location" placeholder="Start address" style="width:100%; margin:10px 0;">
            <button id="btn-get-route">Get Directions</button>
            <div id="route-info"></div>
            <p class="route-warning"><strong>⚠️ Warning:</strong> Verify closures with USFS MVUM.</p>
        `;
        if (steps) renderRouteInfo(steps);
        document.getElementById('btn-get-route').onclick = async () => {
            const fromText = document.getElementById('from-location').value;
            if (!fromText) return alert("Enter a starting location");
            try {
                const geo = await fetch(`/api/geocode?q=${encodeURIComponent(fromText)}`).then(r => r.json());
                const routeRes = await fetch('/api/route', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ start: geo.features[0].center, end: [coords.lng, coords.lat] }) });
                const data = await routeRes.json();
                fullRouteGeometry = data.features[0].geometry; lastRouteSteps = processDirections(data.features[0].properties.segments[0].steps);
                renderRouteInfo(lastRouteSteps); renderRoute(fullRouteGeometry);
            } catch (e) { alert("Could not calculate route"); }
        };
    }

    function processDirections(steps) {
        if (!steps || !Array.isArray(steps)) return [];
        return steps.map((step) => ({
            ...step,
            displayLabel: (step.name && step.name !== "-" && step.name.toLowerCase() !== "the road" && !step.instruction.includes(step.name)) ? `${step.instruction} (${step.name})` : step.instruction,
            miles: (step.distance / 1609.34).toFixed(1),
            wayPoints: step.way_points
        }));
    }

    function renderRouteInfo(steps) {
        const infoDiv = document.getElementById('route-info');
        if (!infoDiv) return;
        infoDiv.innerHTML = `<div class="directions-list">${steps.map((s, idx) => `<div class="dir-item" data-index="${idx}">**${s.displayLabel}** (${s.miles} mi)</div>`).join('')}</div>`;
        bindDirectionsClicks(steps);
    }

    async function handleRoadClick(e) { updateNavPanel(e.lngLat, e.features[0].properties.NAME || 'N/A'); }

    function renderRoute(geometry) {
        if (map.getSource('route')) map.getSource('route').setData(geometry);
        else {
            map.addSource('route', { type: 'geojson', data: geometry });
            map.addLayer({ id: 'route-line', type: 'line', source: 'route', paint: { 'line-color': '#1976d2', 'line-width': 6, 'line-opacity': 0.8 } });
            map.addLayer({ id: 'route-arrows', type: 'symbol', source: 'route', layout: { 'symbol-placement': 'line', 'symbol-spacing': 100, 'text-field': '▶', 'text-size': 16 }, paint: { 'text-color': '#1976d2' } });
        }
    }

    async function updateStyle(e) {
        const val = e.target.value;
        map.setStyle(`https://api.maptiler.com/maps/${val}/style.json?key=${mapTilerKey}`);
        map.once('idle', () => { updateTerrain(); updateMapInteractions(); ensureHighlightLayer(); if (fullRouteGeometry) renderRoute(fullRouteGeometry); if (roadsVisible) syncRoads(); syncBoundary(); });
    }

    async function handleForestSelect(e) {
        const data = JSON.parse(e.target.value);
        const opt = e.target.selectedOptions[0];
        currentBounds = data; currentForestName = opt.text;
        currentRoadFile = opt.dataset.roadFile; currentBoundaryFile = opt.dataset.boundaryFile || "undefined";
        map.fitBounds([[data[0], data[1]], [data[2], data[3]]], { padding: 50 });
        closeNav(); syncRoads(); syncBoundary();
    }

    function toggleRoads() { if (!currentRoadFile) return alert("Select a forest first"); roadsVisible = !roadsVisible; if (!roadsVisible) closeNav(); syncRoads(); }
    function toggleBoundary() { if (!currentBoundaryFile || currentBoundaryFile === "undefined") return alert("Select a forest first"); boundaryVisible = !boundaryVisible; syncBoundary(); }

    fetch('forests.json').then(r => r.json()).then(data => {
        const select = document.getElementById('forest-select');
        data.forEach(f => {
            const opt = document.createElement('option');
            opt.value = JSON.stringify(f.bounds); opt.dataset.roadFile = f.road_file; opt.dataset.boundaryFile = f.boundary_file || "undefined"; opt.text = f.name;
            select.appendChild(opt);
        });
    });

    initApp();
</script>
</body>
</html>
