<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>National Forest Explorer</title>
    <script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/pmtiles@3.0.6/dist/pmtiles.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; background: #f4f4f4; }
        #header { padding: 10px; text-align: center; height: 60px; }
        
        #main-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        /* Map Layout */
        #map-wrapper { width: 50%; height: 600px; position: relative; border: 1px solid #999; overflow: visible; background: #fff; transition: width 0.3s ease; }
        #map { width: 100%; height: 100%; }

        /* Drawer Styles */
        #drawer-panel { 
            width: 300px; height: 100%; background: white; 
            position: absolute; top: 0; left: 0; z-index: 20; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.3); overflow-y: auto; 
            transition: transform 0.3s ease; transform: translateX(0);
        }
        
        /* Toggle Class for Closed State */
        #map-wrapper.menu-closed #drawer-panel { transform: translateX(-300px); }
        
        /* The Handle */
        #drawer-handle { 
            position: absolute; top: 100px; left: 300px; z-index: 25; 
            width: 25px; height: 50px; background: white; 
            border: 1px solid #ccc; border-left: none; 
            border-radius: 0 5px 5px 0; cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1); font-size: 14px; color: #555;
            transition: left 0.3s ease;
        }
        #map-wrapper.menu-closed #drawer-handle { left: 0; border-left: 1px solid #ccc; border-radius: 0 5px 5px 0; }

        .tab-bar { display: flex; border-bottom: 1px solid #ccc; background: #f8f8f8; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #fff; border-bottom: 2px solid #2e7d32; }
        
        .tab-content { padding: 15px; }

        /* General Controls */
        select, button { padding: 10px; cursor: pointer; width: 100%; margin-bottom: 8px; display: block; }
        .instructions { font-size: 13px; color: #555; margin-bottom: 10px; line-height: 1.4; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .route-warning { font-size: 10px; color: #b71c1c; margin-top: 10px; line-height: 1.2; background: #ffebee; padding: 5px; border-radius: 4px; }
        #route-info { margin-top: 10px; font-weight: bold; color: #0d47a1; }
        .dir-item { margin-bottom: 5px; border-bottom: 1px dotted #999; padding: 5px 0; cursor: pointer; }
        .dir-item:hover { background: #f0f0f0; }
    </style>
</head>
<body>

<div id="header"><h1>National Forest Explorer</h1></div>

<div id="main-container">
    <div id="map-wrapper">
        
        <div id="drawer-panel">
            <div class="tab-bar">
                <button class="tab-btn active" onclick="openTab('tools')">Tools</button>
                <button class="tab-btn" onclick="openTab('nav')">Navigation</button>
            </div>
            
            <div id="tools-pane" class="tab-content">
                <div class="instructions">Select a forest to begin.</div>
                <select id="forest-select"><option value="" disabled selected>-- Select a Forest --</option></select>
                <select id="base-selector">
                    <option value="streets-v2" selected>Standard (Streets)</option>
                    <option value="outdoor-v2">Outdoor</option>
                    <option value="019e74c9-570e-7893-90e7-a01ec7d07286">Satellite Hybrid</option>
                </select>
                <button id="toggle-roads">Toggle MVUM Roads</button>
                <button id="toggle-boundary">Toggle Forest Boundary</button>
                <button id="btn-screenshot" style="background: #2e7d32; color: white;">Save Screenshot</button>
                <hr>
                <button id="btn-fetch-dates" style="background: #0d47a1; color: white;">Load Satellite Dates</button>
                <select id="date-select" style="display:none"></select>
                <button id="btn-view-snapshot" style="background: #2e7d32; color: white; display: none;">View Selected Date</button>
            </div>

            <div id="nav-pane" class="tab-content" style="display:none;">
                <div id="nav-content"><em>Select a road on the map to see directions.</em></div>
            </div>
        </div>
        
        <div id="drawer-handle" onclick="toggleDrawer()">⋮</div>
        
        <div id="map"></div>
    </div>
</div>

<div id="image-modal" onclick="this.style.display='none'" style="display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.85); align-items:center; justify-content:center; cursor:pointer;">
    <img id="modal-img" style="max-width:90%; max-height:85%; border:4px solid white;">
</div>

<script>
    let mapTilerKey, sentinelInstanceId, sentinelLayerId, map;
    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol("pmtiles", protocol.tile);

    let roadsVisible = false, boundaryVisible = false, currentRoadFile = null, currentBoundaryFile = null, currentBounds = null, currentForestName = "";
    let fullRouteGeometry = null, lastRouteSteps = null, activeHighlightIndex = null;

    // --- Drawer Logic ---
    function toggleDrawer() {
        document.getElementById('map-wrapper').classList.toggle('menu-closed');
        setTimeout(() => map.resize(), 300);
    }

    function openTab(tab) {
        document.getElementById('tools-pane').style.display = (tab === 'tools') ? 'block' : 'none';
        document.getElementById('nav-pane').style.display = (tab === 'nav') ? 'block' : 'none';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === tab));
        
        // Ensure menu is open if switching tabs
        document.getElementById('map-wrapper').classList.remove('menu-closed');
        map.resize();
    }

    // --- Expansion Logic ---
    function expandMap() {
        document.getElementById('map-wrapper').style.width = '100%';
        map.resize();
    }

    // --- Utilities ---
    async function getAccessToken() {
        try { const r = await fetch('/api/get-token'); const d = await r.json(); return d.access_token; } 
        catch (e) { return null; }
    }

    async function fetchAvailableDates() {
        const dateSelect = document.getElementById('date-select');
        const viewBtn = document.getElementById('btn-view-snapshot');
        dateSelect.innerHTML = '<option>Searching...</option>';
        dateSelect.style.display = 'block';

        const token = await getAccessToken();
        const center = map.getCenter();
        try {
            const response = await fetch('https://sh.dataspace.copernicus.eu/api/v1/catalog/1.0.0/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                    bbox: [center.lng - 0.1, center.lat - 0.1, center.lng + 0.1, center.lat + 0.1],
                    datetime: '2026-01-01T00:00:00Z/..',
                    collections: ['sentinel-2-l2a'],
                    limit: 10
                })
            });
            const data = await response.json();
            dateSelect.innerHTML = '';
            if (!data.features || data.features.length === 0) return dateSelect.innerHTML = '<option>No imagery found</option>';
            const dates = [...new Set(data.features.map(f => f.properties.datetime.split('T')[0]))];
            dates.forEach(d => { const opt = document.createElement('option'); opt.value = d; opt.innerText = d; dateSelect.appendChild(opt); });
            viewBtn.style.display = 'block';
        } catch (e) { dateSelect.innerHTML = '<option>Error loading dates</option>'; }
    }

    async function loadSatellitePreview() {
        const selectedDate = document.getElementById('date-select').value;
        const modal = document.getElementById('image-modal');
        const token = await getAccessToken();
        const bounds = map.getBounds();
        const bbox = `${bounds.getWest()},${bounds.getSouth()},${bounds.getEast()},${bounds.getNorth()}`;
        const wmsUrl = `https://sh.dataspace.copernicus.eu/ogc/wms/${sentinelInstanceId}?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&LAYERS=${sentinelLayerId}&STYLES=&WIDTH=1024&HEIGHT=1024&FORMAT=image/png&TRANSPARENT=true&BBOX=${bbox}&CRS=EPSG:4326&TIME=${selectedDate}/${selectedDate}&access_token=${token}`;
        document.getElementById('modal-img').src = wmsUrl;
        modal.style.display = 'flex';
    }

    async function captureView() {
        const imgData = map.getCanvas().toDataURL('image/png');
        const link = document.createElement('a'); link.href = imgData; link.download = `view-${Date.now()}.png`; link.click();
        const metadata = { forest: currentForestName, bounds: map.getBounds().toArray(), center: map.getCenter(), zoom: map.getZoom(), timestamp: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(metadata, null, 2)], {type: 'application/json'});
        const metaLink = document.createElement('a'); metaLink.href = URL.createObjectURL(blob); metaLink.download = `meta-${Date.now()}.json`; metaLink.click();
    }

    // --- Map Operations ---
    function updateTerrain() {
        const base = document.getElementById('base-selector').value;
        if (base === '019e74c9-570e-7893-90e7-a01ec7d07286') {
            if (!map.getSource('terrain')) map.addSource('terrain', { type: 'raster-dem', url: `https://api.maptiler.com/tiles/terrain-rgb/tiles.json?key=${mapTilerKey}` });
            map.setTerrain({ source: 'terrain', exaggeration: 1.5 });
        } else { map.setTerrain(null); }
    }

    function syncRoads() {
        if (map.getLayer('road-casing')) map.removeLayer('road-casing');
        if (map.getLayer('road-core')) map.removeLayer('road-core');
        if (map.getSource('roads')) map.removeSource('roads');
        if (roadsVisible && currentRoadFile) {
            map.addSource('roads', { type: 'vector', url: `pmtiles://tiles/${currentRoadFile}` });
            map.addLayer({ "id": "road-casing", "type": "line", "source": "roads", "source-layer": "mvum_roads", "paint": { "line-color": "#ffffff", "line-width": 6 } });
            map.addLayer({ "id": "road-core", "type": "line", "source": "roads", "source-layer": "mvum_roads", "paint": { "line-color": "#e65100", "line-width": 3 } });
        }
    }

    function syncBoundary() {
        if (map.getLayer('boundary-fill')) map.removeLayer('boundary-fill');
        if (map.getSource('boundary-source')) map.removeSource('boundary-source');
        if (currentBoundaryFile && currentBoundaryFile !== "undefined" && boundaryVisible) {
            map.addSource('boundary-source', { type: 'vector', url: `pmtiles://tiles/${currentBoundaryFile}` });
            map.addLayer({ "id": "boundary-fill", "type": "fill", "source": "boundary-source", "source-layer": "forest_boundary", "paint": { "fill-color": "#2e7d32", "fill-opacity": 0.3 } });
        }
    }

    function updateStyle() {
        const val = document.getElementById('base-selector').value;
        map.setStyle(`https://api.maptiler.com/maps/${val}/style.json?key=${mapTilerKey}`);
        map.once('idle', () => { updateTerrain(); syncRoads(); syncBoundary(); });
    }

    function ensureHighlightLayer() {
        if (!map.getSource('highlight-route')) {
            map.addSource('highlight-route', { type: 'geojson', data: { type: 'LineString', coordinates: [] } });
            map.addLayer({ id: 'highlight-route', type: 'line', source: 'highlight-route', paint: { 'line-color': '#ff00ff', 'line-width': 10, 'line-opacity': 0.9 } });
        }
    }

    // --- Navigation Logic ---
    async function handleRoadClick(e) {
        openTab('nav');
        const coords = e.lngLat;
        const name = e.features[0].properties.NAME || 'N/A';
        document.getElementById('nav-content').innerHTML = `
            <strong>Road:</strong> ${name}<br>
            <input type="text" id="from-location" placeholder="Start address" style="width:100%; margin:10px 0;">
            <button id="btn-get-route">Get Directions</button>
            <div id="route-info"></div>
            <p class="route-warning"><strong>⚠️ Verify closures with USFS MVUM.</strong></p>
        `;
        document.getElementById('btn-get-route').onclick = async () => {
            const geo = await fetch(`/api/geocode?q=${encodeURIComponent(document.getElementById('from-location').value)}`).then(r => r.json());
            const routeRes = await fetch('/api/route', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ start: geo.features[0].center, end: [coords.lng, coords.lat] }) });
            const data = await routeRes.json();
            fullRouteGeometry = data.features[0].geometry;
            lastRouteSteps = processDirections(data.features[0].properties.segments[0].steps);
            renderRouteInfo(lastRouteSteps); renderRoute(fullRouteGeometry);
        };
    }

    function processDirections(steps) {
        return steps.map(s => ({ ...s, displayLabel: (s.name && s.name !== "-" && !s.instruction.includes(s.name)) ? `${s.instruction} (${s.name})` : s.instruction, miles: (s.distance / 1609.34).toFixed(1), wayPoints: s.way_points }));
    }

    function renderRouteInfo(steps) {
        document.getElementById('route-info').innerHTML = `<div class="directions-list">${steps.map((s, idx) => `<div class="dir-item" onclick="highlightSegment(${idx})">**${s.displayLabel}** (${s.miles} mi)</div>`).join('')}</div>`;
    }

    function highlightSegment(index) {
        const step = lastRouteSteps[index];
        const seg = fullRouteGeometry.coordinates.slice(step.wayPoints[0], step.wayPoints[1] + 1);
        map.getSource('highlight-route').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: seg } });
        const bbox = turf.bbox({type: 'LineString', coordinates: seg});
        map.fitBounds([[bbox[0], bbox[1]], [bbox[2], bbox[3]]], { padding: 50 });
    }

    function renderRoute(geometry) {
        if (map.getSource('route')) map.getSource('route').setData(geometry);
        else {
            map.addSource('route', { type: 'geojson', data: geometry });
            map.addLayer({ id: 'route-line', type: 'line', source: 'route', paint: { 'line-color': '#1976d2', 'line-width': 6, 'line-opacity': 0.8 } });
        }
    }

    // --- Init ---
    async function initApp() {
        const config = await fetch('/api/get-config').then(r => r.json());
        mapTilerKey = config.mapTilerKey; sentinelInstanceId = config.sentinelInstanceId; sentinelLayerId = config.sentinelLayerId;

        map = new maplibregl.Map({ container: 'map', style: `https://api.maptiler.com/maps/streets-v2/style.json?key=${mapTilerKey}`, center: [-98.6, 39.8], zoom: 3 });
        map.addControl(new maplibregl.FullscreenControl({ container: document.querySelector('#map-wrapper') }), 'top-right');
        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        document.getElementById('btn-fetch-dates').addEventListener('click', fetchAvailableDates);
        document.getElementById('btn-view-snapshot').addEventListener('click', loadSatellitePreview);
        document.getElementById('btn-screenshot').addEventListener('click', captureView);
        document.getElementById('base-selector').addEventListener('change', updateStyle);
        
        document.getElementById('forest-select').addEventListener('change', (e) => {
            const data = JSON.parse(e.target.value);
            const opt = e.target.selectedOptions[0];
            currentBounds = data; currentForestName = opt.text;
            currentRoadFile = opt.dataset.roadFile; currentBoundaryFile = opt.dataset.boundaryFile;
            map.fitBounds([[data[0], data[1]], [data[2], data[3]]], { padding: 50 });
            syncRoads(); syncBoundary();
            expandMap();
        });
        
        document.getElementById('toggle-roads').addEventListener('click', () => { roadsVisible = !roadsVisible; syncRoads(); });
        document.getElementById('toggle-boundary').addEventListener('click', () => { boundaryVisible = !boundaryVisible; syncBoundary(); });
        
        map.on('click', 'road-core', handleRoadClick);
        map.on('load', () => { ensureHighlightLayer(); });
    }

    fetch('forests.json').then(r => r.json()).then(data => {
        const select = document.getElementById('forest-select');
        data.forEach(f => {
            const opt = document.createElement('option');
            opt.value = JSON.stringify(f.bounds); opt.dataset.roadFile = f.road_file; opt.dataset.boundaryFile = f.boundary_file || "undefined"; opt.text = f.name;
            select.appendChild(opt);
        });
    });

    initApp();
</script>
</body>
</html>
